name: Generate daily 2up report

on:
  push:
    branches:
      - main
  schedule:
    # GitHub cron uses UTC. This runs at 07:47 UTC daily.
    # In UK winter this is 07:47 London time; in UK summer this is 08:47 London time.
    # Avoiding exactly 08:00 helps reduce scheduled workflow delays.
    - cron: "47 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      # GitHub does not allow secrets directly in step-level if conditions.
      # This env flag lets the workflow choose the fixture-bank fallback when no live API key exists.
      API_FOOTBALL_KEY_PRESENT: ${{ secrets.API_FOOTBALL_KEY != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch live fixtures
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_LEAGUE_IDS: ${{ vars.API_FOOTBALL_LEAGUE_IDS }}
        run: python scripts/fetch_live_fixtures.py

      - name: Seed fixtures from bank fallback
        if: ${{ env.API_FOOTBALL_KEY_PRESENT != 'true' || vars.USE_FIXTURE_BANK_FALLBACK == 'true' }}
        run: python scripts/seed_fixtures_today_from_bank.py

      - name: Generate daily report and static site files
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/generate_daily_report.py

      - name: Add daily pick calendar to index page
        run: python scripts/inject_daily_pick_calendar.py

      - name: Commit generated fixture and report files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures_today.csv team_stats.csv reports/daily_report.md reports/archive docs/index.html docs/data/today.json data/fixture_bank_may_2026.csv
          git diff --cached --quiet && echo "No report changes to commit" || git commit -m "Update live fixtures and daily 2up report"
          git push
