name: Generate 2up report

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Seed fixtures from ChatGPT-maintained fixture bank
        run: python scripts/seed_fixtures_today_from_bank.py

      - name: Generate report and static site files
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/generate_daily_report.py

      - name: Add daily pick calendar to index page
        run: python scripts/inject_daily_pick_calendar.py

      - name: Commit generated fixture and report files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures_today.csv team_stats.csv reports/daily_report.md reports/archive docs/index.html docs/data/today.json data/fixture_bank_may_2026.csv
          git diff --cached --quiet && echo "No report changes to commit" || git commit -m "Update ChatGPT fixture-bank 2up report"
          git push
