name: Generate 2up next-picks homepage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-homepage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate pick-only homepage
        run: python scripts/generate_daily_report.py

      - name: Commit generated homepage files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/daily_report.md reports/archive docs/index.html docs/data/today.json docs/data/next_picks.json
          git diff --cached --quiet && echo "No homepage changes to commit" || git commit -m "Update 2up next-picks homepage"
          git push
